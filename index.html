<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Procedural Tile Map</title>
   <link rel="stylesheet" href="style.css"/>
</head>

<body>
  <div id="ui">
    <h1>Tile Map Generator</h1>
    <label>Grid size <input id="size" type="range" min="4" max="40" value="18"><span class="val"
        id="sizeVal">18</span></label>
    <label>Water % <input id="water" type="range" min="0" max="100" value="42"><span class="val"
        id="waterVal">42</span></label>
    <label>Continents <input id="structure" type="range" min="0" max="100" value="55"><span class="val"
        id="structureVal">55</span></label>
    <label>Seed <input id="seed" type="number" value="7"></label>
    <label>Show grid <input id="showGrid" type="checkbox" checked></label>
    <button id="regen">Regenerate</button>
    <div id="legend">Drag to orbit · scroll to zoom · right-drag to pan</div>
  </div>
  <button id="drawerToggle">Tile Types</button>
  <aside id="drawer">
    <div class="drawer-header">
      <h2>Tile Types</h2>
      <button id="drawerClose" aria-label="Close">×</button>
    </div>
    <ul id="tileList"></ul>
  </aside>
  <canvas id="c"></canvas>

  <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="script.js"></script>
 
</body>

</html>
